<!DOCTYPE html>
<html>
<head>
  <title>JSS Registration</title>

  <style>
    body {
      background-color: #020c1b;
      font-family: Arial;
      color: gold;
    }

    .container {
      width: 60%;
      margin: auto;
      background: #0a192f;
      padding: 30px;
      border-radius: 10px;
      margin-top: 30px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid gold;
      background: #020c1b;
      color: white;
    }

    button {
      background: gold;
      padding: 12px;
      width: 100%;
      border: none;
      cursor: pointer;
    }

    .logo {
      position: absolute;
      top: 10px;
      left: 20px;
      width: 100px;
    }
  </style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="container">
  <h1>Jan Sabha Summit Registration</h1>

  <form id="form">

    <input id="name" placeholder="Full Name" required>
    <input id="year" placeholder="Year / Standard" required>
    <input id="college" placeholder="School / College" required>
    <input id="phone" placeholder="Phone Number" required>
    <input id="email" placeholder="Email" required>

    <input id="mun_exp" placeholder="MUN Experience">

    <select id="committee1">
      <option>UNHRC</option>
      <option>UNSC</option>
      <option>Lok Sabha</option>
    </select>

    <input id="portfolio1" placeholder="Portfolio Preference 1">

    <select id="committee2">
      <option>UNHRC</option>
      <option>UNSC</option>
      <option>Lok Sabha</option>
    </select>

    <input id="portfolio2" placeholder="Portfolio Preference 2">

    <input id="payment" placeholder="Paste Payment Screenshot Link">

    <button type="submit">Submit</button>

  </form>
</div>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const scriptURL = "https://script.google.com/macros/s/AKfycbwEAV6O27LnKq_MQ5ePxaTdHS-zGe6FLL84rS9ooZsrj8h8PhCafCtnYDzuzDUp96Qhrg/exec";

  let data = {
    name: name.value,
    year: year.value,
    college: college.value,
    phone: phone.value,
    email: email.value,
    mun_exp: mun_exp.value,
    committee1: committee1.value,
    portfolio1: portfolio1.value,
    committee2: committee2.value,
    portfolio2: portfolio2.value,
    payment_link: payment.value
  };

  await fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("Submitted!");
});
</script>

</body>
</html>
