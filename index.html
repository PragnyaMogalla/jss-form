<!DOCTYPE html>
<html>
<head>
  <title>JSS Registration</title>

  <!-- 🔷 Mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    /* 🔥 FIX OVERFLOW ISSUE */
    * {
      box-sizing: border-box;
    }

    /* ===== BODY ===== */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #020c1b;
      color: gold;

      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ===== LOGO ===== */
    .logo {
      display: block;
      margin: 0 auto 10px auto;
      width: 100%;
      
    }

    /* ===== CONTAINER ===== */
    .container {
      width: 60%;
      max-width: 600px;
      background: #0a192f;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* ===== INPUTS ===== */
    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid gold;
      background: #020c1b;
      color: white;
      border-radius: 6px;
      font-size: 14px;
    }

    input::placeholder {
      color: #aaa;
    }

    /* ===== ROW ===== */
    .row {
      display: flex;
      gap: 10px;
    }

    .row input {
      width: 50%;
    }

    /* ===== BUTTON ===== */
    button {
      background: gold;
      color: black;
      padding: 14px;
      width: 100%;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 10px;
    }

    button:hover {
      background: #d4af37;
    }

    /* ===== MOBILE FIX ===== */
    @media (max-width: 768px) {

      body {
        display: block;              /* remove flex */
        padding: 80px 10px 20px;    /* equal spacing */
      }

      .container {
        width: 100%;
        margin: 0 auto;             /* center properly */
        padding: 20px;
      }

      .row {
        flex-direction: column;
      }

      .row input {
        width: 100%;
      }

      .logo {
        width: 70px;
      }

      h1 {
        font-size: 20px;
      }
    }

  </style>
</head>

<body>


<div class="container">

  <!-- ===== LOGO ===== -->
<img src="logo.png" class="logo">

  <!-- ===== TITLE ===== -->
  <h1>Registration Form</h1>

  <form id="form">

    <!-- ===== BASIC INFO ===== -->
    <div class="row">
      <input id="name" placeholder="Full Name" required>
      <input id="year" placeholder="Year / Standard" required>
    </div>

    <input id="college" placeholder="School / College" required>

    <!-- ===== CONTACT ===== -->
    <div class="row">
      <input id="phone" placeholder="Phone Number" required>
      <input id="email" placeholder="Email" required>
    </div>

    <!-- ===== MUN DETAILS ===== -->
    <input id="mun_exp" type="number" placeholder="Number of MUN Experiences">

    <!-- ===== COMMITTEE PREF 1 ===== -->
    <select id="committee1" required>
      <option value="">Committee Preference 1</option>
      <option>UNHRC</option>
      <option>UNSC</option>
      <option>Lok Sabha</option>
      <option>AIPPM</option>
    </select>

    <input id="portfolio1" placeholder="Portfolio Preference 1">

    <!-- ===== COMMITTEE PREF 2 ===== -->
    <select id="committee2">
      <option value="">Committee Preference 2</option>
      <option>UNHRC</option>
      <option>UNSC</option>
      <option>Lok Sabha</option>
      <option>AIPPM</option>
    </select>

    <input id="portfolio2" placeholder="Portfolio Preference 2">

    <!-- ===== PAYMENT ===== -->
    <input id="payment" placeholder="Paste Payment Screenshot Link (Drive link)">

    <!-- ===== SUBMIT ===== -->
    <button type="submit">Submit Registration</button>

  </form>

</div>

<script>

document.getElementById("form").addEventListener("submit", async function(e) {

  e.preventDefault();

  /* 🔴 PASTE YOUR GOOGLE APPS SCRIPT URL HERE */
  const scriptURL = "https://script.google.com/macros/s/AKfycbwEAV6O27LnKq_MQ5ePxaTdHS-zGe6FLL84rS9ooZsrj8h8PhCafCtnYDzuzDUp96Qhrg/exec";

  let data = {
    name: document.getElementById("name").value,
    year: document.getElementById("year").value,
    college: document.getElementById("college").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    mun_exp: document.getElementById("mun_exp").value,
    committee1: document.getElementById("committee1").value,
    portfolio1: document.getElementById("portfolio1").value,
    committee2: document.getElementById("committee2").value,
    portfolio2: document.getElementById("portfolio2").value,
    payment_link: document.getElementById("payment").value
  };

  try {
    await fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    alert("✅ Registration Successful!");
    document.getElementById("form").reset();

  } catch (error) {
    alert("❌ Error submitting form");
  }

});

</script>

</body>
</html>
